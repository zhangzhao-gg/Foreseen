<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- 外圈：墨水晕开的痕迹 -->
  <circle cx="24" cy="24" r="22" stroke="#1a1208" stroke-width="0.5" opacity="0.3"/>
  <circle cx="24" cy="24" r="18" stroke="#1a1208" stroke-width="0.3" opacity="0.15"/>

  <!-- 眼形轮廓：杏仁眼，用两条贝塞尔曲线 -->
  <path
    d="M6 24 C6 24 14 12 24 12 C34 12 42 24 42 24 C42 24 34 36 24 36 C14 36 6 24 6 24 Z"
    stroke="#1a1208"
    stroke-width="1.5"
    fill="none"
    stroke-linecap="round"
  />

  <!-- 虹膜 -->
  <circle cx="24" cy="24" r="7" stroke="#8b5e3c" stroke-width="1" fill="none"/>

  <!-- 瞳孔：实心墨点 -->
  <circle cx="24" cy="24" r="3.5" fill="#1a1208"/>

  <!-- 瞳孔高光：暗示意识 -->
  <circle cx="22.5" cy="22.5" r="1" fill="#d4c4a8" opacity="0.8"/>

  <!-- 底部墨滴：墨水渗出 -->
  <path
    d="M24 36 C24 36 23 40 24 44 C25 40 24 36 24 36 Z"
    fill="#1a1208"
    opacity="0.6"
  />

  <!-- 顶部细线：像翻开的书页 -->
  <path
    d="M16 11 C20 8 28 8 32 11"
    stroke="#1a1208"
    stroke-width="0.6"
    fill="none"
    opacity="0.4"
    stroke-linecap="round"
  />
</svg>
